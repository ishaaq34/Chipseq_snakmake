# ChIP-seq Snakemake Pipeline Configuration
# Edit this file to customize your analysis

# Reference genome files
genome:
  fasta: "Sus_scrofa.Sscrofa11.1.dna.toplevel.fa"
  gtf: "Sus_scrofa.Sscrofa11.1.115.gtf"
  index_prefix: "trim/ssindex"
  effective_size: 1989461652 # Sus scrofa genome size

  # Optional: URLs for automatic download (leave empty if files are local)
  fasta_url: "" # e.g., "ftp://ftp.ensembl.org/pub/release-115/fasta/sus_scrofa/dna/Sus_scrofa.Sscrofa11.1.dna.toplevel.fa.gz"
  gtf_url: "" # e.g., "ftp://ftp.ensembl.org/pub/release-115/gtf/sus_scrofa/Sus_scrofa.Sscrofa11.1.115.gtf.gz"

# Sequencing type: "paired" or "single"
sequencing_type: "paired"

# Pipeline starting point: "raw", "fastq", or "bam"
start_from: "raw"

# Directory structure
directories:
  raw_reads: "Raw_reads"
  trim: "Trim_galore"
  alignment: "bowtie_align"
  dedup: "de_duplicate4"
  qc: "bam_QC_PBC"
  deeptools: "deeptools_QC"
  logs: "logs"

# General processing settings
threads: 6

# =====================================================
# Tool-Specific Parameters
# =====================================================

# Trim_galore settings
trim_galore:
  quality: 20
  min_length: 20
  adapter: "auto" # Options: illumina, nextera, small_rna, auto

# Bowtie2 alignment settings
bowtie2:
  sensitivity: "--very-sensitive" # Options: --very-fast, --fast, --sensitive, --very-sensitive
  no_unal: true # Suppress unaligned reads in output
  no_mixed: true # Suppress unpaired alignments (PE only)
  no_discordant: true # Suppress discordant alignments (PE only)

# Samtools filtering settings
samtools:
  mapq_threshold: 30 # Minimum mapping quality (0-60)
  sam_flags_exclude: 768 # SAM flags to exclude
  # Breakdown of 768:
  #   256 = not primary alignment (secondary/supplementary)
  #   512 = read fails quality checks
  # NOTE: Flags 4/8 (unmapped) excluded by --no-unal in Bowtie2
  # NOTE: Flag 1024 (duplicate) handled by separate markdup rule

# DeepTools settings
deeptools:
  bin_size: 1000
  smooth_length: 60
  normalization_method: "RPGC" # Options: RPGC, CPM, BPM, RPKM, None

  # Region analysis
  tss_upstream: 3000
  tss_downstream: 10000
  gene_body_length: 5000
  gene_body_upstream: 1000
  gene_body_downstream: 1000

  # Plot styling
  plots:
    dpi: 600 # High resolution for publication

    correlation:
      plot_width: 11
      plot_height: 9.5

    pca:
      plot_width: 14
      plot_height: 12
      markers: [] # Empty = use defaults
      colors: [] # Empty = use defaults

# MACS3 peak calling
macs3:
  # Sample configuration (leave empty to use metadata_tsv instead)
  samples: {}

  # Metadata-driven configuration (recommended)
  metadata_tsv: "" # Path to metadata TSV file

  # MACS3 parameters
  params:
    genome_size: "hs" # hs, mm, ce, dm, or integer
    pvalue_cutoff: 0.01 # P-value for peak calling (lenient for IDR workflow)
    # qvalue_cutoff: 0.05      # Alternative: use q-value instead of p-value (comment out pvalue_cutoff above)
    keep_dup: "all" # all, auto, or integer
    broad_cutoff: 0.1
    generate_bedgraph: false # Enable -B flag
    bedgraph_spmr: false # Enable --SPMR (requires generate_bedgraph)
    format: "BAM" # BAM or BAMPE (use BAMPE for paired-end)
    no_model: false # Override fragment size estimation
    extsize: 200 # Fragment size if no_model = true

# Optional tools
optional_tools:
  # SPP (strand cross-correlation)
  spp_script: "/opt/anaconda3/envs/chip/bin/run_spp.R"
  run_spp: false

  # HOMER motif analysis
  run_homer: false
  homer_params:
    size: 200
    length: "8,10,12"
    mask: true

# Resource limits (adjust based on your system)
resources:
  align_mem_mb: 8000
  markdup_mem_mb: 4000
  deeptools_mem_mb: 16000
  default_mem_mb: 4000
